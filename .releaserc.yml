branches:
  - main
plugins:
  - - "@semantic-release/commit-analyzer"
    - preset: angular
      releaseRules:
        - type: chore
          release: patch
        - type: docs
          release: patch
        - type: style
          release: patch
        - type: refactor
          release: patch
        - type: performance
          release: patch
        - type: test
          release: patch
  - "@semantic-release/release-notes-generator"
  - "@semantic-release/github"